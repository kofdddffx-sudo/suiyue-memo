name: Build Android APK

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 main 分支时自动触发（可选）
  # push:
  #   branches: [main]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装 Java (Android 构建需要)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. 安装 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. 安装项目依赖
      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install
          cd client && pnpm install
          cd ../server && pnpm install

      # 6. 生成原生 Android 项目
      - name: Prebuild Android
        run: |
          cd client
          npx expo prebuild --platform android --no-install

      # 7. 构建 APK
      - name: Build APK
        run: |
          cd client/android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 8. 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: client/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # 9. 重命名 APK（可选，使文件名更清晰）
      - name: Rename APK
        run: |
          mv client/android/app/build/outputs/apk/release/app-release-unsigned.apk client/android/app/build/outputs/apk/release/suiyue-memo-v1.0.0.apk

      # 10. 上传重命名后的 APK
      - name: Upload renamed APK
        uses: actions/upload-artifact@v4
        with:
          name: suiyue-memo-apk
          path: client/android/app/build/outputs/apk/release/suiyue-memo-v1.0.0.apk
          retention-days: 30
